metadata:
  version: Pumalal Pro v2
  location: Pumalal, La Araucanía, Chile
  methodology: 'Base inicial curada: fuentes chilenas primero (Jardinería en Chile, INIA, SAG), luego RHS/extensión universitaria.
    Las fechas se ajustan al clima frío-húmedo de Pumalal: lluvia, heladas, rocío, presión de hongos y seguridad de consumo
    en frutales.'
  sources:
  - name: Jardinería en Chile, M. Gabriela Saldías, Universidad Central
    role: 'Base chilena: poda, plagas, propagación, bulbosas, acidófilas, rosales y coníferas'
    url: archivo subido en ChatGPT
  - name: INIA Chile
    role: Frutales, enfermedades y ventanas preventivas
    url: https://biblioteca.inia.cl
  - name: SAG Chile
    role: Plaguicidas autorizados, etiquetas y carencias
    url: https://www.sag.gob.cl
  - name: RHS
    role: Poda ornamental, rosales, semillas y sanidad cultural
    url: https://www.rhs.org.uk
  - name: Raúl Silva Vargas
    role: Jardinería chilena, especies ornamentales y árboles; referencia bibliográfica para ampliar base
    url: 'obras: Principios de jardinería, Árboles, Las cuatro estaciones, 500 preguntas sobre el jardín'
  - name: Gardens Illustrated
    role: Referencia editorial de alto nivel; apoyo estético y horticultural, no normativa fitosanitaria
    url: https://www.gardensillustrated.com
species:
- name: Rosas
  latin: Rosa spp.
  group: arbusto
  active: true
  profile: Alta presión de hongos en Pumalal. Manejo preventivo en primavera-verano; no esperar síntomas si históricamente
    colapsan sin fungicida.
  sources:
  - 'Jardinería en Chile: rosales'
  - 'RHS: roses'
  - Adaptación Pumalal
  tasks:
  - start: 01-08
    category: poda
    type: poda fuerte de invierno
    instructions: Abrir centro, eliminar madera enferma, cruzada o débil; dejar estructura aireada.
    priority: alta
    avoid_frost: true
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 10
    frost_limit_c: -1
    edible_warning: false
    notes: ''
  - start: 05-08
    category: sanidad preventiva
    type: post poda
    instructions: Revisar y activar protección preventiva post-poda si hay humedad o lluvias. No aplicar antes de lluvia fuerte.
    priority: alta
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: true
    rain_limit_mm_72h: 5
    frost_limit_c: 0
    edible_warning: false
    notes: ''
  - start: 01-09
    category: fertilización
    type: inicio brotación
    instructions: Fertilizar al comenzar crecimiento activo; evitar exceso de nitrógeno si hay mucha humedad.
    priority: media
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 12
    frost_limit_c: 0
    edible_warning: false
    notes: ''
  - start: 15-09
    category: sanidad preventiva
    type: programa primavera
    instructions: Programa preventivo contra mancha negra, oídio y roya. Frecuencia según producto, lluvia y presión del jardín.
    priority: alta
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: true
    rain_limit_mm_72h: 5
    frost_limit_c: 0
    edible_warning: false
    notes: ''
  - start: 15-11
    category: sanidad preventiva
    type: programa verano húmedo
    instructions: Mantener programa preventivo si hay rocío, riego frecuente o historial fuerte de hongos.
    priority: alta
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: true
    rain_limit_mm_72h: 5
    frost_limit_c: 0
    edible_warning: false
    notes: ''
  - start: 01-12
    category: poda
    type: mantención
    instructions: Eliminar flores secas y material enfermo; mejorar ventilación sin poda fuerte.
    priority: media
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 12
    frost_limit_c: 0
    edible_warning: false
    notes: ''
- name: Manzanos
