- name: Siembras de flores anuales
  latin: mezclas ornamentales
  group: semillas/flores
  active: true
  profile: Módulo genérico para mezclas de flores. En Pumalal, siembra principal de primavera; otoño solo rústicas.
  sources:
  - 'Jardinería en Chile: cubresuelos y flores'
  - 'RHS: hardy annuals'
  - Adaptación Pumalal
  tasks:
  - start: 15-09
    category: siembra
    type: siembra primavera
    instructions: Siembra principal tras lo peor de las heladas. Cama fina, húmeda y sin malezas.
    priority: alta
    avoid_frost: true
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 12
    frost_limit_c: 1
    edible_warning: false
    notes: ''
  - start: 15-03
    category: siembra
    type: otoño rústicas
    instructions: Solo anuales rústicas que toleren frío; proteger de lluvias fuertes y encharcamiento.
    priority: media
    avoid_frost: true
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 15
    frost_limit_c: 0
    edible_warning: false
    notes: ''
  - start: 15-10
    category: fertilización
    type: arranque suave
    instructions: Fertilización suave cuando plántulas estén establecidas.
    priority: media
    avoid_frost: false
    avoid_rain: true
    prefer_after_rain: false
    rain_limit_mm_72h: 12
    frost_limit_c: 0
    edible_warning: false
    notes: ''
